name: Build and Deploy via Tailscale

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        default: 'DEV'
        type: choice
        options:
          - DEV
          - PROD
      config_file:
        description: 'Path to the config file to inject secrets into'
        default: 'src/main/resources/application.properties'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: ${{ github.event.inputs.environment }}-${{ github.event.repository.name }}
      REMOTE_HOST: ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_URL }}
      REMOTE_APP_DIR: ${{ secrets.APPS_DIR }}/${{ github.event.repository.name }}
      CONFIG_FILE: ${{ github.event.inputs.config_file }}

    steps:

      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Check out the repository
        uses: actions/checkout@v5

      # ── 2. Inject secrets into config file ─────────────────────────────────
      #
      # How it works:
      #   - toJSON(secrets) dumps all GitHub Secrets as a JSON object
      #   - jq exports each key=value pair as environment variables
      #   - envsubst replaces every ${VARNAME} placeholder in the config file
      #
      # Your config file just needs placeholders like:
      #   api_key: ${API_KEY}
      #   db_url:  ${POSTGRES_URL}
      #
      # No secret names are hardcoded here — add/remove secrets in GitHub
      # and the workflow picks them up automatically.
      #
      - name: Inject secrets into config file
        env:
          ALL_SECRETS: ${{ toJSON(secrets) }}
        run: |
          if [ ! -f "$CONFIG_FILE" ]; then
            echo "❌ ERROR: Config file not found: $CONFIG_FILE"
            exit 1
          fi
          
          # Export every GitHub Secret as an environment variable.
          # Uses a while read loop instead of xargs — safe for values with
          # spaces, newlines, quotes, or other special characters.
          while IFS= read -r assignment; do
            export "$assignment"
          done < <(echo "$ALL_SECRETS" | jq -r 'to_entries[] | "\(.key)=\(.value)"')
          
          # Replace all ${VARNAME} placeholders in the config file in-place
          envsubst < "$CONFIG_FILE" > "$CONFIG_FILE.tmp" && mv "$CONFIG_FILE.tmp" "$CONFIG_FILE"
          
          echo "✅ Secrets injected into $CONFIG_FILE"

      # ── 3. Normalise IMAGE_NAME to lowercase ───────────────────────────────
      - name: Normalise image name
        run: |
          IMAGE_NAME=$(echo "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV

      # ── 4. Install & authenticate Tailscale ───────────────────────────────
      - name: Install Tailscale
        run: curl -fsSL https://tailscale.com/install.sh | sh

      - name: Authenticate to Tailscale
        run: sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }}

      # ── 5. Configure SSH ──────────────────────────────────────────────────
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      # ── 6. Clean up existing container & image on server ──────────────────
      - name: Clean up existing container and image
        run: |
          ssh -o StrictHostKeyChecking=no $REMOTE_HOST << EOF
            echo "🧹 Stopping and removing container/image: $IMAGE_NAME"
            docker stop $IMAGE_NAME  || true
            docker rm   $IMAGE_NAME  || true
            docker rmi -f $IMAGE_NAME || true
          EOF

      # ── 7. Sync code to server ─────────────────────────────────────────────
      - name: Clean remote app directory
        run: ssh -o StrictHostKeyChecking=no $REMOTE_HOST "rm -rf $REMOTE_APP_DIR"

      - name: Copy repository to server
        run: |
          scp -o StrictHostKeyChecking=no -r . \
            $REMOTE_HOST:$REMOTE_APP_DIR

      # ── 8. Build Docker image and run container ────────────────────────────
      - name: Build image and deploy container
        run: |
          ssh -o StrictHostKeyChecking=no $REMOTE_HOST << EOF
            set -e
            cd $REMOTE_APP_DIR
            echo "🐳 Building image: $IMAGE_NAME"
            docker build -t $IMAGE_NAME .
            echo "🚀 Starting container: $IMAGE_NAME"
            docker run -d -it --name $IMAGE_NAME $IMAGE_NAME
            echo "✅ Deployment complete!"
          EOF