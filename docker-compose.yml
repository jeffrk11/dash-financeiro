services:
  app:
    image: ${IMAGE_NAME}
    container_name: ${IMAGE_NAME}
    ports:
      - "8382:8080"
    networks:
      - firefly_firefly_iii
    restart: unless-stopped
    environment:
      - JAVA_TOOL_OPTIONS=-Duser.timezone=Europe/Lisbon
    security_opt:
      - seccomp:unconfined  # allows real syscall clock reads

networks:
  firefly_firefly_iii:
    external: true